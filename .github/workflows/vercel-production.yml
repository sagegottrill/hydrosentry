# Deploys to Vercel on every push to main (backup when Dashboard → Git webhooks do not trigger).
# Add these GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN          — https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — from local .vercel/project.json "orgId", or Vercel project Settings → General
#   VERCEL_PROJECT_ID     — from local .vercel/project.json "projectId", or same Settings page
#   (projectId starts with prj_; orgId starts with team_ — paste each value into its own secret, no quotes.)

name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-hydrosentry-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
